<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Через вселенные со студлидером</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        #tutorial-overlay-snake {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
            z-index: 10;
        }
        .tutorial-text-snake {
            font-family: monospace;
            font-size: 3.5rem;
            font-weight: bold;
            color: #000;
            opacity: 0.3;
            white-space: pre;
            text-align: center;
            display: none;
        }
        .tutorial-swipe-snake {
            width: 70px;
            animation: swipeUpAnim 1.5s ease-in-out infinite;
            display: none;
        }
        @keyframes swipeUpAnim {
            0% { transform: translateY(30px); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-40px); opacity: 0; }
        }

        .tutorial-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
            z-index: 10;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab-btn {
            flex: 1; padding: 8px; margin: 0;
            background: #333; border: 1px solid #555; color: #fff;
            border-radius: 8px; cursor: pointer;
        }
        .tab-btn.active { background: #f21511; border-color: #f21511; font-weight: bold; }
        
        #dino-area, #doodle-area {
            overflow: hidden;
            border-radius: 8px;
        }

        /* Стили для туториала Дудла на мобильных */
        .doodle-mobile-split {
            position: absolute; top: 50%; left: 0; width: 100%; border-top: 3px dashed rgba(0,0,0,0.4);
        }
        .doodle-mobile-split-vert {
            position: absolute; top: 50%; left: 50%; height: 50%; border-left: 3px dashed rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div id="screen-main" class="container">
    <h1>Через вселенные со студлидером</h1>
    <nav class="main-menu">
        <button class="btn" onclick="showScreen('screen-play')">Играть</button>
        <button class="btn" onclick="showScreen('screen-leaderboard'); loadLeaderboard('snake');">Таблица лидера</button>
    </nav>
</div>

<div id="screen-play" class="container" style="display: none;">
    <button class="btn" style="margin-bottom: 20px; font-weight: bold;" onclick="initDino()">Я В ПОЛЁТЕ!</button>
    
    <h1>Выберите игру</h1>
    <nav class="game-selection">
        <button class="btn" onclick="initGame()">Игра 1: Змейка</button>
        <button class="btn" onclick="initFlappy()">Игра 2: Птичка</button>
        <button class="btn" onclick="initDoodle()">Игра 3: Дудл</button>
    </nav>
    <button class="back-link" onclick="showScreen('screen-main')">Назад</button>
</div>

<!-- ИГРА 1: ЗМЕЙКА -->
<div id="screen-game" class="container game-container" style="display: none;">
    <div id="game-area-snake">
        <div class="game-header"><span><span id="player-name-snake">Игрок</span></span><span>Счет: <span id="score-snake">0</span></span></div>
        <div style="position: relative; width: 100%;">
            <canvas id="gameCanvas"></canvas>
            <div id="tutorial-overlay-snake" style="display: none;">
                <div id="tut-keys-snake" class="tutorial-text-snake">  W  <br>A S D</div>
                <img id="tut-swipe-snake" src="укащательный.png" class="tutorial-swipe-snake" alt="Свайп вверх">
            </div>
        </div>
        <div id="gameOverSnake" style="display: none;">
            <h2>Игра окончена!</h2>
            <p>Ваш счет: <span id="finalScoreSnake"></span></p>
            <button class="btn" onclick="initGame()">Сначала</button>
            <button class="btn" onclick="showScreen('screen-leaderboard'); loadLeaderboard('snake');">Таблица лидера</button>
            <button class="btn" style="background:#555" onclick="showScreen('screen-main')">Меню</button>
        </div>
    </div>
</div>

<!-- ИГРА 2: ПТИЧКА -->
<div id="screen-flappy" class="container game-container" style="display: none;">
    <div id="flappy-area">
        <div class="game-header"><span><span id="player-name-flappy">Игрок</span></span><span>Счет: <span id="flappy-score">0</span></span></div>
        <div style="position: relative; width: 100%;">
            <canvas id="flappyCanvas" style="border-radius: 8px; border: 2px solid #58a6ff;"></canvas>
            <div id="tutorial-overlay-flappy" class="tutorial-overlay" style="display: none;">
                <div id="flappy-tut-text" style="font-size: 2rem; display: block; opacity: 0.8; color: white; text-shadow: 2px 2px 4px #000; font-weight: bold; font-family: monospace;">КЛИК / ПРОБЕЛ</div>
            </div>
        </div>
        <div id="flappyGameOver" style="display: none;">
            <h2>Игра окончена!</h2>
            <p>Ваш счет: <span id="flappyFinalScore"></span></p>
            <button class="btn" onclick="initFlappy()">Сначала</button>
            <button class="btn" onclick="showScreen('screen-leaderboard'); loadLeaderboard('flappy');">Таблица лидера</button>
            <button class="btn" style="background:#555" onclick="showScreen('screen-main')">Меню</button>
        </div>
    </div>
</div>

<!-- ИГРА 3: ДУДЛ (НОВАЯ) -->
<div id="screen-doodle" class="container game-container" style="display: none;">
    <div id="doodle-area">
        <div class="game-header"><span><span id="player-name-doodle">Игрок</span></span><span>Счет: <span id="doodle-score">0</span></span></div>
        <div style="position: relative; width: 100%;">
            <canvas id="doodleCanvas" style="border-radius: 8px; border: 2px solid #58a6ff; background: #eef7ff; display: block;"></canvas>
            <div id="tutorial-overlay-doodle" class="tutorial-overlay" style="display: none;">
                <!-- Десктоп туториал -->
                <div id="tut-desktop-doodle" style="display:none; font-size: 1.5rem; text-align: center; color: #333; font-weight: bold; padding: 10px; background: rgba(255,255,255,0.7); border-radius: 10px;">
                    W A D или &larr; &rarr; &uarr;
                </div>
                <!-- Мобайл туториал -->
                <div id="tut-mobile-doodle" style="display:none; width: 100%; height: 100%; position: relative;">
                    <div class="doodle-mobile-split"></div>
                    <div class="doodle-mobile-split-vert"></div>
                    <div style="position: absolute; top: 25%; width: 100%; text-align: center; font-size: 2rem; font-weight: bold; color: rgba(0,0,0,0.5);">ВЫСТРЕЛ</div>
                    <div style="position: absolute; top: 75%; left: 25%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: bold; color: rgba(0,0,0,0.5);">&larr;</div>
                    <div style="position: absolute; top: 75%; left: 75%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: bold; color: rgba(0,0,0,0.5);">&rarr;</div>
                </div>
            </div>
        </div>
        <div id="doodleGameOver" style="display: none;">
            <h2>Вы упали!</h2>
            <p>Ваш счет: <span id="doodleFinalScore"></span></p>
            <button class="btn" onclick="initDoodle()">Ещё разок</button>
            <button class="btn" onclick="showScreen('screen-leaderboard'); loadLeaderboard('doodle');">Таблица лидера</button>
            <button class="btn" style="background:#555" onclick="showScreen('screen-main')">Меню</button>
        </div>
    </div>
</div>

<!-- ИГРА 4: ДИНО (ПОЛЁТ) -->
<div id="screen-dino" class="container game-container" style="display: none;">
    <div id="dino-area">
        <div class="game-header"><span><span id="player-name-dino">Игрок</span></span><span>Счет: <span id="dino-score">0</span></span></div>
        <div style="position: relative; width: 100%;">
            <canvas id="dinoCanvas" style="border: 2px solid #58a6ff; background: #ffffff; display: block;"></canvas>
            <div id="tutorial-overlay-dino" class="tutorial-overlay" style="display: none;">
                <div style="font-size: 2rem; display: block; opacity: 0.8; color: #333; text-shadow: 1px 1px 2px #fff; font-weight: bold; font-family: monospace;">КЛИК / ПРОБЕЛ</div>
            </div>
        </div>
        <div id="dinoGameOver" style="display: none;">
            <h2>Ой, сгорели!</h2>
            <p>Ваш счет: <span id="dinoFinalScore"></span></p>
            <button class="btn" onclick="initDino()">Ещё разок</button>
            <button class="btn" onclick="showScreen('screen-leaderboard'); loadLeaderboard('dino');">Таблица лидера</button>
            <button class="btn" style="background:#555" onclick="showScreen('screen-main')">Меню</button>
        </div>
    </div>
</div>

<!-- ТАБЛИЦА ЛИДЕРОВ -->
<div id="screen-leaderboard" class="container" style="display: none;">
    <div style="text-align: center; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <img id="lb-user-photo" src="" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; display: none;">
        <span id="lb-user-name" style="font-size: 1.2em; font-weight: bold;"></span>
    </div>
    <div class="tabs">
        <button id="tab-snake" class="tab-btn active" onclick="loadLeaderboard('snake')">Змейка</button>
        <button id="tab-flappy" class="tab-btn" onclick="loadLeaderboard('flappy')">Птичка</button>
        <button id="tab-doodle" class="tab-btn" onclick="loadLeaderboard('doodle')">Дудл</button>
        <button id="tab-dino" class="tab-btn" onclick="loadLeaderboard('dino')">ПОЛЁТ</button>
    </div>
    <div class="table-container">
        <table id="leaderboardTable">
            <thead><tr><th>№</th><th>Очки</th><th>Дата и время</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="back-link" onclick="showScreen('screen-main')">В меню</button>
</div>

<script>
    let userInfo = { id: 0, first_name: 'Игрок', last_name: '', photo_100: '' };
    let isVKInitialized = false, currentGame = '';
    let isFirstLaunchInSession = true, isFirstLaunchInSessionFlappy = true, isFirstLaunchInSessionDino = true, isFirstLaunchInSessionDoodle = true;

    // Ресурсы для птички
    const bgImg = new Image(); bgImg.src = 'фон.png';
    const birdImg = new Image(); birdImg.src = 'машаптичкп.png';
    const pipeImg = new Image(); pipeImg.src = 'ручка.png';

    // Ресурсы для полёта (дино)
    const dinoBgImg = new Image(); dinoBgImg.src = 'raznsyemashi/фонготов.png';
    const dinoJumpImg = new Image(); dinoJumpImg.src = 'raznsyemashi/прыгмаша.png';
    const dinoRun1Img = new Image(); dinoRun1Img.src = 'raznsyemashi/шагмаша.png';
    const dinoRun2Img = new Image(); dinoRun2Img.src = 'raznsyemashi/шаг2маша.png';
    const dinoDeadImg = new Image(); dinoDeadImg.src = 'raznsyemashi/машадэд.png';
    const cakeImg = new Image(); cakeImg.src = 'raznsyemashi/тортиии.png';

    // Ресурсы для Дудла
    const doodleImg = new Image(); doodleImg.src = 'raznsyemashi/дудлмаша.png';
    const doodleShootImg = new Image(); doodleShootImg.src = 'raznsyemashi/машастфри.png';
    const doodlePlatformImg = new Image(); doodlePlatformImg.src = 'ручка.png';
    const roachImg = new Image(); roachImg.src = 'raznsyemashi/тараканп.png';
    const alarmImg = new Image(); alarmImg.src = 'raznsyemashi/будила без фона.png';

    // Переменные для змейки
    const gridSize = 20;
    let snake, food, direction, score, gameLoop, changingDirection, snakeTutorialTimeout;

    // Переменные для птички
    let flappyLoop, flappyScore, flappyStartTime, isDying, deathTime;
    let bird = { x: 50, y: 150, v: 0, width: 68, height: 68, angle: 0 };
    let pipes = [];
    let nextPipeFrame = 0; 
    const gravity = 0.35, jumpStrength = -6.5, basePipeSpeed = 3.0, pipeWidth = 50; 
    const groundLevel = 375;
    let flappyFrames = 0;

    // Переменные для дино
    let dinoLoop, dinoScore, dinoFrames, isDinoDead, nextCactusFrame;
    let dino = { x: 40, y: 0, vy: 0, width: 44, height: 47 };
    let dinoCacti = [];
    let dinoSpeed = 5;
    let dinoBgX = 0;
    let dinoGroundLevel = 0;
    const dinoGravity = 0.6;
    const dinoJumpV = -10.5;
    let weatherParticles = [];

    // Переменные для дудла
    let doodleLoop, doodleScore, isDoodleDead;
    // Увеличены размеры в 2 раза (было 45, стало 90)
    let doodleObj = { x: 0, y: 0, vx: 0, vy: 0, width: 90, height: 90 };
    let doodlePlatforms = [];
    let doodleMonsters = [];
    let doodleBullets = [];
    let doodleShootEndTime = 0;
    let doodleMoveLeft = false;
    let doodleMoveRight = false;

    function showScreen(screenId) {
        document.querySelectorAll('body > div.container').forEach(div => div.style.display = 'none');
        document.getElementById(screenId).style.display = 'block';
        if (gameLoop) clearInterval(gameLoop);
        if (flappyLoop) clearInterval(flappyLoop);
        if (dinoLoop) clearInterval(dinoLoop);
        if (doodleLoop) clearInterval(doodleLoop);
        currentGame = '';
    }

    async function startApp() {
        try { await vkBridge.send('VKWebAppInit'); isVKInitialized = true; userInfo = await vkBridge.send('VKWebAppGetUserInfo'); } catch (e) {}
    }
    startApp();

    function getFormattedDate() {
        const now = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        return { time: `${pad(now.getHours())}:${pad(now.getMinutes())}`, date: `${pad(now.getDate())}.${pad(now.getMonth() + 1)}` };
    }

    // --- ЗМЕЙКА ---
    function initGame() {
        showScreen('screen-game'); currentGame = 'snake';
        document.getElementById('gameOverSnake').style.display = 'none';
        document.getElementById('gameCanvas').style.display = 'block';
        document.getElementById('player-name-snake').textContent = userInfo.first_name;
        const canvas = document.getElementById('gameCanvas');
        let containerWidth = document.getElementById('game-area-snake').clientWidth || window.innerWidth - 40;
        canvas.width = Math.floor(containerWidth / gridSize) * gridSize;
        canvas.height = canvas.width;
        snake = [{ x: 10, y: 10 }];
        direction = 'right';
        changingDirection = false;
        score = 0;
        document.getElementById('score-snake').textContent = 0;
        generateFood();
        const tutorial = document.getElementById('tutorial-overlay-snake');
        if (isFirstLaunchInSession) {
            const tutKeys = document.getElementById('tut-keys-snake');
            const tutSwipe = document.getElementById('tut-swipe-snake');
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) { tutKeys.style.display = 'none'; tutSwipe.style.display = 'block'; }
            else { tutKeys.style.display = 'block'; tutSwipe.style.display = 'none'; }
            tutorial.style.display = 'flex'; tutorial.style.opacity = '1';
            if (snakeTutorialTimeout) clearTimeout(snakeTutorialTimeout);
            snakeTutorialTimeout = setTimeout(() => {
                tutorial.style.opacity = '0';
                setTimeout(() => { tutorial.style.display = 'none'; }, 1000);
            }, 3000);
            isFirstLaunchInSession = false;
        } else { tutorial.style.display = 'none'; }
        gameLoop = setInterval(updateSnake, 120);
    }

    function generateFood() {
        const canvas = document.getElementById('gameCanvas');
        let isFoodOnSnake = true;
        while (isFoodOnSnake) {
            food = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)),
                y: Math.floor(Math.random() * (canvas.height / gridSize))
            };
            isFoodOnSnake = snake.some(segment => segment.x === food.x && segment.y === food.y);
        }
    }

    function updateSnake() {
        changingDirection = false;
        const head = { x: snake[0].x, y: snake[0].y };
        if (direction === 'right') head.x++;
        if (direction === 'left') head.x--;
        if (direction === 'up') head.y--;
        if (direction === 'down') head.y++;
        const canvas = document.getElementById('gameCanvas');
        if (head.x < 0 || head.x * gridSize >= canvas.width || head.y < 0 || head.y * gridSize >= canvas.height || snake.some(seg => seg.x === head.x && seg.y === head.y)) {
            clearInterval(gameLoop); currentGame = 'gameover';
            document.getElementById('finalScoreSnake').textContent = score;
            document.getElementById('gameOverSnake').style.display = 'block';
            document.getElementById('gameCanvas').style.display = 'none';
            document.getElementById('tutorial-overlay-snake').style.display = 'none';
            saveScore('snake', score); return;
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score++; document.getElementById('score-snake').textContent = score; generateFood();
        } else { snake.pop(); }
        drawSnake();
    }

    function drawSnake() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        snake.forEach((s, i) => {
            ctx.fillStyle = i === 0 ? '#df1515' : '#000000';
            ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize - 1, gridSize - 1);
        });
        ctx.fillStyle = '#ffbb00';
        ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
    }

    // --- ПТИЧКА ---
    function initFlappy() {
        showScreen('screen-flappy'); currentGame = 'flappy';
        const canvas = document.getElementById('flappyCanvas');
        canvas.width = document.getElementById('flappy-area').clientWidth || window.innerWidth - 40;
        canvas.height = 400;
        bird.y = 150; bird.v = 0; bird.angle = 0; pipes = []; flappyFrames = 0; flappyScore = 0;
        isDying = false; deathTime = 0; flappyStartTime = Date.now();
        nextPipeFrame = 0;
        document.getElementById('flappy-score').textContent = 0;
        document.getElementById('flappyGameOver').style.display = 'none';
        document.getElementById('flappyCanvas').style.display = 'block';
        if (isFirstLaunchInSessionFlappy) {
            document.getElementById('tutorial-overlay-flappy').style.display = 'flex';
            document.getElementById('tutorial-overlay-flappy').style.opacity = '1';
        }
        isFirstLaunchInSessionFlappy = false;
        flappyLoop = setInterval(updateFlappy, 20);
    }

    function jumpFlappy() {
        if (currentGame !== 'flappy' || isDying) return;
        bird.v = jumpStrength; bird.angle = -20;
        const tut = document.getElementById('tutorial-overlay-flappy');
        if (tut.style.display === 'flex') { tut.style.opacity = '0'; setTimeout(() => { if(tut) tut.style.display = 'none'; }, 500); }
    }

    function updateFlappy() {
        const canvas = document.getElementById('flappyCanvas');
        if (isDying) {
            let now = Date.now();
            if (now - deathTime > 500) {
                bird.v += gravity * 2.5; bird.y += bird.v;
                if (bird.angle < 90) bird.angle += 4;
                if (bird.y + bird.height >= groundLevel) {
                    bird.y = groundLevel - bird.height;
                    clearInterval(flappyLoop); currentGame = 'gameover';
                    document.getElementById('flappyFinalScore').textContent = flappyScore;
                    document.getElementById('flappyGameOver').style.display = 'block';
                    document.getElementById('flappyCanvas').style.display = 'none';
                    saveScore('flappy', flappyScore);
                }
            }
            drawFlappy(); return;
        }
        bird.v += gravity; bird.y += bird.v;
        if (bird.y < -20) { isDying = true }
        if (bird.v > 0 && bird.angle < 30) bird.angle += 1.5;
        let elapsedTime = (Date.now() - flappyStartTime) / 1000;
        let progress = Math.min(1, elapsedTime / 60); 
        let currentPipeSpeed = basePipeSpeed * Math.min(2, 1 + (elapsedTime / 40));
        if (flappyFrames >= nextPipeFrame) {
            let maxTopY = 145;
            let topY = Math.floor(Math.random() * (maxTopY - 50 + 1)) + 50;
            let isMoving = Math.random() < 0.15; 
            let verticalSpeed = isMoving ? (Math.random() > 0.5 ? 0.7 : -0.7) : 0;
            let currentGap = 162.5 - (32.5 * progress);
            pipes.push({ x: canvas.width, topY: topY, passed: false, moving: isMoving, vy: verticalSpeed, gap: currentGap });
            let currentInterval = 90 - (45 * progress);
            nextPipeFrame = flappyFrames + Math.round(currentInterval);
        }
        let bBox = { x: bird.x + 25, y: bird.y + 25, w: bird.width - 50, h: bird.height - 50 };
        pipes.forEach(p => {
            p.x -= currentPipeSpeed;
            if (p.moving) { p.topY += p.vy; if (p.topY < 50 || p.topY > 145) { p.vy *= -1; } }
            let pBoxW = pipeWidth * 0.4;
            let pX = p.x + (pipeWidth - pBoxW) / 2;
            if (bBox.x < pX + pBoxW && bBox.x + bBox.w > pX) {
                if (bBox.y < p.topY || bBox.y + bBox.h > p.topY + p.gap) {
                    isDying = true; deathTime = Date.now();
                    document.getElementById('tutorial-overlay-flappy').style.display = 'none';
                }
            }
            if (p.x + pipeWidth < bird.x && !p.passed) { flappyScore++; document.getElementById('flappy-score').textContent = flappyScore; p.passed = true; }
        });
        pipes = pipes.filter(p => p.x > -pipeWidth);
        if (bird.y + bird.height >= groundLevel) {
            bird.y = groundLevel - bird.height; isDying = true; deathTime = Date.now();
            document.getElementById('tutorial-overlay-flappy').style.display = 'none';
        }
        drawFlappy(); flappyFrames++;
    }

    function drawFlappy() {
        const ctx = document.getElementById('flappyCanvas').getContext('2d');
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        if (bgImg.complete) ctx.drawImage(bgImg, 0, 0, ctx.canvas.width, ctx.canvas.height);
        pipes.forEach(p => {
            if (pipeImg.complete) {
                ctx.save(); ctx.translate(p.x + pipeWidth / 2, p.topY); ctx.scale(1, -1);
                ctx.drawImage(pipeImg, -pipeWidth / 2, 0, pipeWidth, 400); ctx.restore();
                ctx.drawImage(pipeImg, p.x, p.topY + p.gap, pipeWidth, 400);
            }
        });
        if (birdImg.complete) {
            ctx.save(); ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.rotate(bird.angle * Math.PI / 180);
            ctx.drawImage(birdImg, -bird.width / 2, -bird.height / 2, bird.width, bird.height); ctx.restore();
        }
    }

    // --- ДУДЛ (НОВАЯ ИГРА) ---
    function initDoodle() {
        showScreen('screen-doodle'); currentGame = 'doodle';
        document.getElementById('player-name-doodle').textContent = userInfo.first_name;

        doodleObj.vy = 0;
        doodleObj.vx = 0;
        
        doodleScore = 0;
        isDoodleDead = false;
        doodlePlatforms = [];
        doodleMonsters = [];
        doodleBullets = [];
        doodleMoveLeft = false;
        doodleMoveRight = false;

            doodlePlatforms.push({
                x: Math.random() * (canvas.width - 65),
                y: canvas.height - i * 75
            });
        }
        // Подстраховка — платформа прямо под игроком

        doodlePlatforms[0].y = doodleObj.y + doodleObj.height;

    function shootDoodle() {
        if (currentGame !== 'doodle' || isDoodleDead) return;
        doodleShootEndTime = Date.now() + 500; // Смена спрайта на 0.5с
        doodleBullets.push({ x: doodleObj.x + doodleObj.width / 2, y: doodleObj.y });
    }

    function updateDoodle() {
        if (isDoodleDead) {
            clearInterval(doodleLoop);
            currentGame = 'gameover';
            document.getElementById('doodleFinalScore').textContent = Math.floor(doodleScore);
            document.getElementById('doodleGameOver').style.display = 'block';
            document.getElementById('doodleCanvas').style.display = 'none';
            document.getElementById('tutorial-overlay-doodle').style.display = 'none';
            saveScore('doodle', Math.floor(doodleScore));
            return;
        }

        const canvas = document.getElementById('doodleCanvas');
        
        // Движение
        if (doodleMoveLeft) doodleObj.vx = -6;
        else if (doodleMoveRight) doodleObj.vx = 6;
        else doodleObj.vx = 0;

        doodleObj.x += doodleObj.vx;
        doodleObj.vy += 0.4; // гравитация
        doodleObj.y += doodleObj.vy;

        // Переход за края экрана
        if (doodleObj.x < -doodleObj.width) doodleObj.x = canvas.width;
        if (doodleObj.x > canvas.width) doodleObj.x = -doodleObj.width;

        // Прыжки по платформам (только при падении вниз)
        if (doodleObj.vy > 0) {
            for (let p of doodlePlatforms) {
                if (doodleObj.y + doodleObj.height >= p.y &&
                    doodleObj.y + doodleObj.height - doodleObj.vy <= p.y + 15 && 
                    doodleObj.x + doodleObj.width > p.x &&
                    doodleObj.x < p.x + 65) { 
                    doodleObj.vy = -10.5; // Сила прыжка
                    break;
                }
            }
        }

        // Движение камеры вверх
        if (doodleObj.y < canvas.height / 2) {
            let diff = canvas.height / 2 - doodleObj.y;
            doodleObj.y = canvas.height / 2;
            doodleScore += diff / 10;
            document.getElementById('doodle-score').textContent = Math.floor(doodleScore);

            for (let p of doodlePlatforms) p.y += diff;
            for (let m of doodleMonsters) m.y += diff;
            for (let b of doodleBullets) b.y += diff;
        }

        // Обновление платформ (Удаляем ушедшие вниз)
        doodlePlatforms = doodlePlatforms.filter(p => p.y <= canvas.height);
        
        // Спавн новых платформ выше самой высокой
        while (doodlePlatforms.length < 7) {
            let minY = Math.min(...doodlePlatforms.map(p => p.y));
            let newX = Math.random() * (canvas.width - 65);
            doodlePlatforms.push({ x: newX, y: minY - 75 });
            
            // 10% шанс спавна монстра
            if (Math.random() < 0.1) {
                let mType = Math.random() > 0.5 ? 'roach' : 'alarm';
                let startVx = (Math.random() > 0.5 ? 2 : -2); // Движение монстра
                doodleMonsters.push({
                    x: newX,
                    y: minY - 75 - 75, // ставим над платформой, учитывая увеличенный размер 
                    type: mType,
                    width: 80, height: 80,
                    vx: startVx
                });
            }
        }

        // Движение монстров по горизонтали
        for (let m of doodleMonsters) {
            m.x += m.vx;
            if (m.x < 0 || m.x + m.width > canvas.width) {
                m.vx *= -1; // отскок от краев
            }
        }

        // Полет пуль
        doodleBullets.forEach(b => b.y -= 15);
        doodleBullets = doodleBullets.filter(b => b.y > 0);

        // Столкновения пуль с монстрами
        doodleMonsters = doodleMonsters.filter(m => {
            let hit = false;
            doodleBullets = doodleBullets.filter(b => {
                if (!hit && b.x > m.x && b.x < m.x + m.width && b.y > m.y && b.y < m.y + m.height) {
                    hit = true;
                    return false; // пуля уничтожается
                }
                return true;
            });
            return !hit; // монстр уничтожается, если в него попали
        });

        // Удаление ушедших вниз монстров
        doodleMonsters = doodleMonsters.filter(m => m.y < canvas.height);

        // Столкновение игрока с монстрами
        for (let m of doodleMonsters) {
            if (doodleObj.x + doodleObj.width - 20 > m.x && doodleObj.x + 20 < m.x + m.width &&
                doodleObj.y + doodleObj.height - 20 > m.y && doodleObj.y + 20 < m.y + m.height) {
                isDoodleDead = true;
            }
        }

        // Падение вниз
        if (doodleObj.y > canvas.height) {
            isDoodleDead = true;
        }

        drawDoodle();
    }

    function drawDoodle() {
        const canvas = document.getElementById('doodleCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Рисуем платформы
        for (let p of doodlePlatforms) {
            if (doodlePlatformImg.complete && doodlePlatformImg.width > 0) {
                ctx.drawImage(doodlePlatformImg, p.x, p.y, 65, 15);
            } else {
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(p.x, p.y, 65, 15);
            }
        }

        // Рисуем монстров
        for (let m of doodleMonsters) {
            let img = m.type === 'roach' ? roachImg : alarmImg;
            if (img.complete && img.width > 0) {
                ctx.save();
                // Зеркальное отражение для таракана, идущего вправо
                if (m.type === 'roach' && m.vx > 0) {
                    ctx.translate(m.x + m.width, m.y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(img, 0, 0, m.width, m.height);
                } else {
                    ctx.drawImage(img, m.x, m.y, m.width, m.height);
                }
                ctx.restore();
            } else {
                ctx.fillStyle = m.type === 'roach' ? 'brown' : 'red';
                ctx.fillRect(m.x, m.y, m.width, m.height);
            }
        }

        // Рисуем пули
        ctx.fillStyle = '#ff4500';
        for (let b of doodleBullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Рисуем персонажа
        let currentDoodleImg = Date.now() < doodleShootEndTime ? doodleShootImg : doodleImg;
        if (currentDoodleImg.complete && currentDoodleImg.width > 0) {
            ctx.save();
            // Зеркальное отражение персонажа при движении влево
            if (doodleObj.vx < 0 || doodleMoveLeft) {
                ctx.translate(doodleObj.x + doodleObj.width, doodleObj.y);
                ctx.scale(-1, 1);
                ctx.drawImage(currentDoodleImg, 0, 0, doodleObj.width, doodleObj.height);
            } else {
                ctx.drawImage(currentDoodleImg, doodleObj.x, doodleObj.y, doodleObj.width, doodleObj.height);
            }
            ctx.restore();
        } else {
            ctx.fillStyle = '#333';
            ctx.fillRect(doodleObj.x, doodleObj.y, doodleObj.width, doodleObj.height);
        }
    }

    function initDino() {

        dino.y = dinoGroundLevel - dino.height;

        document.getElementById('dino-score').textContent = 0;

        document.getElementById('dinoCanvas').style.display = 'block';

    function jumpDino() {
        if (currentGame !== 'dino' || isDinoDead) return;
        if (dino.y >= dinoGroundLevel - dino.height - 1) { 
            dino.vy = dinoJumpV;
            const tut = document.getElementById('tutorial-overlay-dino');
            if (tut.style.display === 'flex') { tut.style.opacity = '0'; setTimeout(() => { if(tut) tut.style.display = 'none'; }, 500); }
        }

    function updateDino() {
        const canvas = document.getElementById('dinoCanvas');
        if (isDinoDead) {
            clearInterval(dinoLoop); currentGame = 'gameover'; 
            let finalPoints = Math.floor(dinoScore / 5);
            document.getElementById('dinoFinalScore').textContent = finalPoints;
            document.getElementById('dinoGameOver').style.display = 'block';
            document.getElementById('dinoCanvas').style.display = 'none';
            document.getElementById('tutorial-overlay-dino').style.display = 'none';
            saveScore('dino', finalPoints); return;
        }
        dino.vy += dinoGravity; dino.y += dino.vy;
        if (dino.y > dinoGroundLevel - dino.height) { dino.y = dinoGroundLevel - dino.height; dino.vy = 0; }
        let displayScore = Math.floor(dinoScore / 5);
        if (dinoFrames >= nextCactusFrame) {
            let spawnCake = (displayScore >= 500) && (Math.random() < 0.3);
            if (spawnCake) {
                let isHigh = Math.random() > 0.5;
                let cY = isHigh ? dinoGroundLevel - 75 : dinoGroundLevel - 35; 
                dinoCacti.push({ type: 'cake', x: canvas.width + 20, y: cY, width: 36, height: 22 });
            } else {
                let numCandles = Math.floor(Math.random() * 3) + 1;
                let isLarge = Math.random() > 0.5;
                let cWidth = isLarge ? 18 : 12;
                let cSpacing = 4;
                let candlesGroup = [];
                for(let i=0; i<numCandles; i++) {
                    let h = isLarge ? (35 + Math.random()*15) : (20 + Math.random()*10);
                    candlesGroup.push({ xOff: i * (cWidth + cSpacing), w: cWidth, h: h });
                }
                dinoCacti.push({ type: 'candles', x: canvas.width + 20, y: dinoGroundLevel, candles: candlesGroup });
            }
            let interval = Math.max(35, 90 - (dinoSpeed - 5) * 8); 
            interval += Math.random() * 40; nextCactusFrame = dinoFrames + interval;
        }
        let dBox = { x: dino.x + 10, y: dino.y + 5, w: dino.width - 20, h: dino.height - 10 };
        dinoCacti.forEach(c => {
            let speed = (c.type === 'cake') ? dinoSpeed * 0.7 : dinoSpeed;
            c.x -= speed;
            if (c.type === 'cake') {
                let cBox = { x: c.x - 18, y: c.y - 11, w: c.width, h: c.height };
                if (dBox.x < cBox.x + cBox.w && dBox.x + dBox.w > cBox.x && dBox.y < cBox.y + cBox.h && dBox.y + dBox.h > cBox.y) { isDinoDead = true; }
            } else {
                c.candles.forEach(candle => {
                    let cBox = { x: c.x + candle.xOff, y: c.y - candle.h - 8, w: candle.w, h: candle.h + 8 };
                    if (dBox.x < cBox.x + cBox.w && dBox.x + dBox.w > cBox.x && dBox.y < cBox.y + cBox.h && dBox.y + dBox.h > cBox.y) { isDinoDead = true; }
                });
            }
        });
        dinoCacti = dinoCacti.filter(c => c.x > -50);
        dinoBgX -= dinoSpeed * 0.4;
        if (dinoBgImg.complete && dinoBgImg.width > 0) {
            let bgRatio = dinoBgImg.width / dinoBgImg.height;
            let bgDrawW = canvas.height * bgRatio;
            if (dinoBgX <= -bgDrawW) dinoBgX += bgDrawW;
        }
        
        updateWeather(dinoScore / 5, canvas);
        
        dinoScore++; if (dinoFrames % 300 === 0) dinoSpeed += 0.4;
        document.getElementById('dino-score').textContent = displayScore;
        dinoFrames++; drawDino();
    }

    function getWeatherState(exactScore) {
        if (exactScore < 500) return { active: false };
        let rel = exactScore - 500;
        let cycle = rel % 900; 
        if (cycle < 400) {
            let phase = cycle;
            let appearProg = Math.min(1, Math.max(0, phase / 75)); 
            let disappearProg = Math.max(0, Math.min(1, (phase - 325) / 75)); 
            return { active: true, type: 'snow', appear: appearProg, disappear: disappearProg };
        } else if (cycle < 450) {
            return { active: false };
        } else if (cycle < 850) {
            let phase = cycle - 450;
            let appearProg = Math.min(1, Math.max(0, phase / 25)); 
            let disappearProg = Math.max(0, Math.min(1, (phase - 375) / 25)); 
            return { active: true, type: 'rain', appear: appearProg, disappear: disappearProg };
        } else {
            return { active: false };
        }
    }

    function updateWeather(exactScore, canvas) {
        let wState = getWeatherState(exactScore);
        if (!wState.active) {
            if (weatherParticles.length > 0) weatherParticles = [];
            return;
        }
        if (weatherParticles.length > 0 && weatherParticles[0].type !== wState.type) {
            weatherParticles = [];
        }
        if (weatherParticles.length < 50) {
            for(let i=0; i<60; i++) {
                weatherParticles.push({
                    type: wState.type, 
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: wState.type === 'snow' ? (0.5 + Math.random()) : (12 + Math.random() * 12),
                    w: Math.random() * 2 - 1
                });
            }
        }
        weatherParticles.forEach(p => {
            p.y += p.s;
            if (wState.type === 'snow') { p.x += Math.sin(dinoFrames * 0.05) * 0.5 + p.w; } 
            else { p.x -= 6; }
            if (p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
            if (p.x < -20) p.x = canvas.width + 20;
            if (p.x > canvas.width + 20) p.x = -20;
        });
    }

    function drawDino() {
        const canvas = document.getElementById('dinoCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (dinoBgImg.complete && dinoBgImg.width > 0) {
            let bgRatio = dinoBgImg.width / dinoBgImg.height;
            let drawW = canvas.height * bgRatio;
            let drawX = dinoBgX;
            while (drawX < canvas.width) {
                ctx.drawImage(dinoBgImg, drawX, 0, drawW, canvas.height);
                drawX += drawW;
            }
        }
        ctx.strokeStyle = '#535353'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, dinoGroundLevel); ctx.lineTo(canvas.width, dinoGroundLevel); ctx.stroke();
        
        let exactScore = dinoScore / 5;
        let wState = getWeatherState(exactScore);

        if (wState.active && weatherParticles.length > 0) {
            let offset = 0; let alpha = 1;
            if (wState.appear < 1) { offset = -(1 - wState.appear) * canvas.height; alpha = wState.appear; } 
            else if (wState.disappear > 0) { offset = wState.disappear * canvas.height; alpha = 1 - wState.disappear; }
            ctx.save(); ctx.globalAlpha = alpha;
            ctx.fillStyle = wState.type === 'snow' ? '#70a1ff' : '#00008b';
            weatherParticles.forEach(p => {
                let drawY = p.y + offset;
                if (wState.type === 'snow') { ctx.fillRect(p.x, drawY, 3, 3); } 
                else { ctx.fillRect(p.x, drawY, 2, 10); }
            });
            ctx.restore();
        }

        dinoCacti.forEach(c => {
            if (c.type === 'cake') {
                ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(((dinoFrames * 3) * Math.PI / 180));
                if (cakeImg.complete && cakeImg.width > 0) {
                    let imgWidth = 40; let imgHeight = 40;
                    ctx.drawImage(cakeImg, -imgWidth / 2, -imgHeight / 2, imgWidth, imgHeight);
                } ctx.restore();
            } else {
                c.candles.forEach(candle => {
                    let cx = c.x + candle.xOff; let cy = c.y - candle.h;
                    ctx.fillStyle = '#535353'; ctx.fillRect(cx, cy, candle.w, candle.h);
                    ctx.fillStyle = '#ff9900'; ctx.beginPath(); ctx.arc(cx + candle.w / 2, cy - 4, 4, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(cx + candle.w / 2, cy - 4, 2, 0, Math.PI * 2); ctx.fill();
                });
            }
        });
        let currentImg;
        if (isDinoDead) { currentImg = dinoDeadImg; } 
        else if (dino.y < dinoGroundLevel - dino.height - 2) { currentImg = dinoJumpImg; } 
        else { currentImg = Math.floor(dinoFrames / 6) % 2 === 0 ? dinoRun1Img : dinoRun2Img; }
        if (currentImg && currentImg.complete) { ctx.drawImage(currentImg, dino.x, dino.y, dino.width, dino.height); }
    }

    // --- ОБЩАЯ ЛОГИКА И УПРАВЛЕНИЕ ---

    async function saveScore(game, scoreVal) {
        if (!isVKInitialized) return;
        const key = 'leaderboard_' + game;
        const { time, date } = getFormattedDate();
        const data = await vkBridge.send('VKWebAppStorageGet', { keys: [key] });
        let list = data.keys[0].value ? JSON.parse(data.keys[0].value) : [];
        list.push({ id: userInfo.id, score: scoreVal, time, date });
        list.sort((a, b) => b.score - a.score);
        let counts = {};
        list = list.filter(e => { counts[e.id] = (counts[e.id] || 0) + 1; return counts[e.id] <= 5; });
        await vkBridge.send('VKWebAppStorageSet', { key, value: JSON.stringify(list.slice(0, 50)) });
    }

        document.getElementById('tab-snake').className = game === 'snake' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tab-flappy').className = game === 'flappy' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tab-dino').className = game === 'dino' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tab-doodle').className = game === 'doodle' ? 'tab-btn active' : 'tab-btn';

        const tbody = document.querySelector('#leaderboardTable tbody');
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Загрузка...</td></tr>';
        
        const data = await vkBridge.send('VKWebAppStorageGet', { keys: ['leaderboard_' + game] });
        const list = data.keys[0].value ? JSON.parse(data.keys[0].value) : [];
        
        tbody.innerHTML = list.length ? list.map((e, i) => `
            <tr><td>${i+1}</td><td>${e.score}</td><td><span style="font-size: 0.9em; color: #aaa;">${e.date || ''}</span><br>${e.time || ''}</td></tr>
        `).join('') : '<tr><td colspan="3" style="text-align:center;">Нет рекордов</td></tr>';
        
        showScreen('screen-leaderboard');
    }

    // Клавиатура
    window.addEventListener('keydown', e => {
        if (currentGame === 'snake') {
            if (changingDirection) return;
            if ((e.keyCode === 37 || e.keyCode === 65) && direction !== 'right') { direction = 'left'; changingDirection = true; }
            if ((e.keyCode === 38 || e.keyCode === 87) && direction !== 'down') { direction = 'up'; changingDirection = true; }
            if ((e.keyCode === 39 || e.keyCode === 68) && direction !== 'left') { direction = 'right'; changingDirection = true; }
            if ((e.keyCode === 40 || e.keyCode === 83) && direction !== 'up') { direction = 'down'; changingDirection = true; }
        } 
        else if (currentGame === 'flappy' || currentGame === 'dino') { 
            if ([32, 38, 87].includes(e.keyCode)) { e.preventDefault(); if (currentGame === 'flappy') jumpFlappy(); else jumpDino(); } 
        }
        else if (currentGame === 'doodle') {
            if (e.keyCode === 65 || e.keyCode === 37) doodleMoveLeft = true;
            if (e.keyCode === 68 || e.keyCode === 39) doodleMoveRight = true;
            if ([32, 38, 87].includes(e.keyCode)) { e.preventDefault(); shootDoodle(); }
        }
    });

    window.addEventListener('keyup', e => {
        if (currentGame === 'doodle') {
            if (e.keyCode === 65 || e.keyCode === 37) doodleMoveLeft = false;
            if (e.keyCode === 68 || e.keyCode === 39) doodleMoveRight = false;
        }
    });

    // Мышь (клики)
    window.addEventListener('mousedown', e => {
        if (currentGame === 'flappy') jumpFlappy(); 
        if (currentGame === 'dino') jumpDino(); 
        // На десктопе клик теперь ТОЛЬКО стреляет, движение мышью убрано
        if (currentGame === 'doodle') {
            shootDoodle(); 
        }
    });

    window.addEventListener('mouseup', e => {
        // Очищаем, если понадобится, но теперь клики на десктопе не двигают
    });

    // Сенсорные экраны
    function handleDoodleTouch(x, y, isDown) {
        if (y < window.innerHeight / 2) {
            if (isDown) shootDoodle();
        } else {
            if (x < window.innerWidth / 2) { doodleMoveLeft = isDown; if (!isDown) doodleMoveLeft = false; } 
            else { doodleMoveRight = isDown; if (!isDown) doodleMoveRight = false; }
        }
    }

    let tX = 0, tY = 0;
    window.addEventListener('touchstart', e => {
        if (currentGame === 'flappy') { e.preventDefault(); jumpFlappy(); } 
        else if (currentGame === 'dino') { e.preventDefault(); jumpDino(); }
        else if (currentGame === 'snake') { tX = e.touches[0].screenX; tY = e.touches[0].screenY; }
        else if (currentGame === 'doodle') {
            e.preventDefault();
            for(let i=0; i<e.changedTouches.length; i++) {
                handleDoodleTouch(e.changedTouches[i].clientX, e.changedTouches[i].clientY, true);
            }
        }
    }, {passive: false});

    window.addEventListener('touchmove', e => { if (currentGame) e.preventDefault(); }, {passive: false});

    window.addEventListener('touchend', e => {
        if (currentGame === 'snake' && !changingDirection) {
            let dX = e.changedTouches[0].screenX - tX, dY = e.changedTouches[0].screenY - tY;
            if (Math.abs(dX) < 15 && Math.abs(dY) < 15) return;
            if (Math.abs(dX) > Math.abs(dY)) {
                if (dX > 0 && direction !== 'left') { direction = 'right'; changingDirection = true; }
                else if (dX < 0 && direction !== 'right') { direction = 'left'; changingDirection = true; }
            } else {
                if (dY > 0 && direction !== 'up') { direction = 'down'; changingDirection = true; }
                else if (dY < 0 && direction !== 'down') { direction = 'up'; changingDirection = true; }
            }
        }
        else if (currentGame === 'doodle') {
            doodleMoveLeft = false; doodleMoveRight = false;
            // Проверяем, остались ли пальцы на нужных зонах экрана
            for(let i=0; i<e.touches.length; i++) {
                let y = e.touches[i].clientY; let x = e.touches[i].clientX;
                if (y >= window.innerHeight / 2) {
                    if (x < window.innerWidth / 2) doodleMoveLeft = true;
                    else doodleMoveRight = true;
                }
            }
        }
    });
</script>
</body>
</html>
